<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабиринт Маски</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 8px;
        }
        .game-container {
            background: #1a1a2e;
            padding: 16px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(255, 100, 0, 0.15);
            max-width: 400px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            padding: 0 6px 12px 6px;
            font-size: 18px;
            font-weight: 600;
        }
        .header .score { color: #f7c948; }
        .header .best { color: #7a8a9f; font-size: 14px; }
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            background: #111827;
            border-radius: 16px;
            border: 2px solid #2a3a6a;
            touch-action: none;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 14px;
        }
        .controls button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            background: #2a3a6a;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 0 #0f1a3a;
        }
        .controls button:active { transform: translateY(4px); box-shadow: none; }
        .controls .left { background: #4a2a6a; }
        .controls .right { background: #2a6a4a; }
        .restart-btn {
            margin-top: 12px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 14px;
            background: #4a3a6a;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
        }
        .restart-btn:hover { background: #5a4a7a; }
        .info {
            text-align: center;
            color: #6a7a8f;
            font-size: 13px;
            margin-top: 10px;
        }
        @media (max-width: 480px) {
            .header { font-size: 15px; }
            .controls button { padding: 12px; font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <span>🏛️ Маска</span>
        <span class="score">🏆 <span id="scoreDisplay">0</span></span>
        <span class="best">👑 <span id="bestDisplay">0</span></span>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button class="left" id="leftBtn">◀</button>
        <button class="right" id="rightBtn">▶</button>
    </div>
    <button class="restart-btn" id="restartBtn">🔄 Начать заново</button>
    <div class="info">Уклоняйся от препятствий, двигайся влево/вправо</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const bestSpan = document.getElementById('bestDisplay');

    // ==== КЛЮЧ ДЛЯ ХРАНЕНИЯ ====
    const STORAGE_KEY = 'tombMaskProgress';

    // ==== ЗАГРУЗКА ПРОГРЕССА ====
    function loadProgress() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) {}
        }
        return { best: 0 };
    }

    // ==== СОХРАНЕНИЕ ПРОГРЕССА ====
    function saveProgress(best) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ best }));
    }

    let progress = loadProgress();
    let best = progress.best;
    bestSpan.textContent = best;

    // Размеры
    const CELL = 40;
    const COLS = 10;
    const ROWS = 10;
    const GAP = 2;

    let player = { x: 4, y: 9 };
    let obstacles = [];
    let score = 0;
    let gameOver = false;
    let frame = 0;
    let speed = 1;

    function generateObstacles() {
        const newObs = [];
        for (let row = 0; row < 10; row++) {
            const count = 2 + Math.floor(Math.random() * 2);
            const positions = [];
            for (let i = 0; i < count; i++) {
                let col;
                do {
                    col = Math.floor(Math.random() * COLS);
                } while (positions.includes(col) || (row === 9 && col === player.x));
                positions.push(col);
                newObs.push({ row, col, type: Math.random() > 0.7 ? 'spike' : 'wall' });
            }
        }
        return newObs;
    }

    obstacles = generateObstacles();

    function resetGame() {
        player = { x: 4, y: 9 };
        obstacles = generateObstacles();
        score = 0;
        gameOver = false;
        frame = 0;
        speed = 1;
        scoreSpan.textContent = score;
    }

    function update() {
        if (gameOver) return;

        player.y -= speed / 60;
        if (player.y < 0) {
            player.y = 0;
            score += 1;
            scoreSpan.textContent = score;

            if (score > best) {
                best = score;
                saveProgress(best);
                bestSpan.textContent = best;
            }

            obstacles = generateObstacles();
            const hit = obstacles.some(o => o.row === Math.floor(player.y) && o.col === player.x);
            if (hit) gameOver = true;
        }

        const row = Math.floor(player.y);
        const col = player.x;
        const hit = obstacles.some(o => o.row === row && o.col === col);
        if (hit) gameOver = true;
    }

    function draw() {
        ctx.clearRect(0, 0, 400, 400);

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const x = c * CELL + GAP;
                const y = r * CELL + GAP;
                ctx.fillStyle = (r + c) % 2 === 0 ? '#1e2a4a' : '#162042';
                ctx.fillRect(x, y, CELL - GAP, CELL - GAP);
            }
        }

        obstacles.forEach(o => {
            const x = o.col * CELL + GAP;
            const y = o.row * CELL + GAP;
            if (o.type === 'spike') {
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.moveTo(x + 10, y + 30);
                ctx.lineTo(x + 20, y + 5);
                ctx.lineTo(x + 30, y + 30);
                ctx.fill();
            } else {
                ctx.fillStyle = '#4a6a9a';
                ctx.shadowColor = '#3a5a8a';
                ctx.shadowBlur = 8;
                ctx.fillRect(x, y, CELL - GAP, CELL - GAP);
                ctx.shadowBlur = 0;
            }
        });

        const exitX = 4 * CELL + GAP;
        const exitY = 0 * CELL + GAP;
        ctx.fillStyle = '#2ecc71';
        ctx.shadowColor = '#2ecc71';
        ctx.shadowBlur = 15;
        ctx.fillRect(exitX, exitY, CELL - GAP, CELL - GAP);
        ctx.shadowBlur = 0;

        const px = player.x * CELL + GAP + 4;
        const py = player.y * CELL + GAP + 4;
        ctx.fillStyle = '#f1c40f';
        ctx.shadowColor = '#f1c40f';
        ctx.shadowBlur = 20;
        ctx.fillRect(px, py, CELL - GAP - 8, CELL - GAP - 8);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(px + 4, py + 4, 6, 6);
        ctx.fillRect(px + 14, py + 4, 6, 6);
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(px + 10, py + 14, 6, 6);

        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('💀 GAME OVER', 200, 180);
            ctx.font = '18px Arial';
            ctx.fillText('Нажми "Заново"', 200, 230);
        }
    }

    function moveLeft() {
        if (gameOver) return;
        if (player.x > 0) {
            const newX = player.x - 1;
            const row = Math.floor(player.y);
            const blocked = obstacles.some(o => o.row === row && o.col === newX);
            if (!blocked) player.x = newX;
        }
    }

    function moveRight() {
        if (gameOver) return;
        if (player.x < COLS - 1) {
            const newX = player.x + 1;
            const row = Math.floor(player.y);
            const blocked = obstacles.some(o => o.row === row && o.col === newX);
            if (!blocked) player.x = newX;
        }
    }

    document.getElementById('leftBtn').addEventListener('click', moveLeft);
    document.getElementById('rightBtn').addEventListener('click', moveRight);
    document.getElementById('restartBtn').addEventListener('click', resetGame);

    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
    });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const dx = e.touches[0].clientX - touchStartX;
        if (dx > 30) moveRight();
        else if (dx < -30) moveLeft();
        touchStartX = e.touches[0].clientX;
    }, { passive: false });

    // Игровой цикл
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    resetGame();
    gameLoop();
</script>
</body>
</html>
