<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mrlaifon — лаунчер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0b1a;
            color: #e0e0f0;
            min-height: 100vh;
            padding: 16px 16px 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === КОНТЕЙНЕР === */
        .app {
            max-width: 480px;
            width: 100%;
            background: #12122a;
            border-radius: 32px;
            padding: 20px 16px 16px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2a5a;
            position: relative;
        }

        /* === ШАПКА === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1f1f42;
        }
        .header .title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #f7c948, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .badge {
            background: #1f1f3a;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #8a8aaa;
            border: 1px solid #2f2f5a;
        }

        /* === ПРОФИЛЬ (аккаунт) === */
        .profile {
            background: #1a1a36;
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            border: 1px solid #2a2a5a;
        }
        .profile .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7c948, #f39c12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: #0b0b1a;
            flex-shrink: 0;
        }
        .profile .info {
            flex: 1;
        }
        .profile .info .name {
            font-weight: 600;
            font-size: 16px;
        }
        .profile .info .status {
            font-size: 13px;
            color: #7a7aaa;
        }
        .profile .login-btn {
            background: #2a4a8a;
            border: none;
            color: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .profile .login-btn:hover { background: #3a5a9a; }

        /* === КАТЕГОРИИ === */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            margin-bottom: 16px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories::-webkit-scrollbar { display: none; }
        .categories button {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid #2a2a5a;
            background: #161632;
            color: #a0a0c0;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .categories button.active {
            background: #2a4a8a;
            border-color: #4a7ac0;
            color: #fff;
            box-shadow: 0 0 20px rgba(60, 100, 255, 0.2);
        }
        .categories button:active { transform: scale(0.96); }

        /* === СЕТКА МОДОВ === */
        .mods-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .mod-card {
            background: #161632;
            border-radius: 20px;
            padding: 14px 16px;
            border: 1px solid #22224a;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: 0.2s;
        }
        .mod-card:active { transform: scale(0.98); }
        .mod-card .icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: #1f1f42;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            border: 1px solid #2a2a5a;
        }
        .mod-card .info {
            flex: 1;
            min-width: 0;
        }
        .mod-card .info .name {
            font-weight: 600;
            font-size: 16px;
        }
        .mod-card .info .desc {
            font-size: 13px;
            color: #8a8aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mod-card .download-btn {
            background: #2a6a4a;
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .mod-card .download-btn:active { transform: scale(0.94); }

        /* === НИЖНЯЯ ПАНЕЛЬ (как в приложении) === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111128;
            border-top: 1px solid #1f1f42;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5a5a8a;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            padding: 0 8px;
        }
        .bottom-nav .nav-item .icon { font-size: 22px; }
        .bottom-nav .nav-item.active { color: #f7c948; }

        /* === ЛИЦЕНЗИЯ И КУКИ === */
        .popup {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            max-width: 480px;
            margin: 0 auto;
            background: #1a1a36;
            border-radius: 20px;
            padding: 18px 20px;
            border: 1px solid #2a2a5a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 2000;
            display: none;
        }
        .popup.show { display: block; }
        .popup h4 { font-size: 16px; margin-bottom: 6px; }
        .popup p { font-size: 13px; color: #8a8aaa; line-height: 1.5; }
        .popup .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .popup .btn-row button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .popup .btn-row .accept {
            background: #2a6a4a;
            color: #fff;
        }
        .popup .btn-row .decline {
            background: #3a2a3a;
            color: #8a7a8a;
        }

        /* === АДАПТИВ === */
        @media (min-width: 481px) {
            .bottom-nav { border-radius: 20px; margin-bottom: 8px; }
            .mods-grid { gap: 14px; }
        }
        @media (max-width: 380px) {
            .header .title { font-size: 18px; }
            .mod-card .icon { width: 44px; height: 44px; font-size: 22px; }
            .mod-card .info .name { font-size: 14px; }
            .mod-card .download-btn { font-size: 12px; padding: 4px 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ШАПКА -->
        <div class="header">
            <span class="title">⚡ Mrlaifon</span>
            <span class="badge">🚀 лаунчер</span>
        </div>

        <!-- ПРОФИЛЬ -->
        <div class="profile" id="profileBlock">
            <div class="avatar" id="avatarDisplay">M</div>
            <div class="info">
                <div class="name" id="userName">Гость</div>
                <div class="status" id="userStatus">Не авторизован</div>
            </div>
            <button class="login-btn" id="loginBtn">Войти</button>
        </div>

        <!-- КАТЕГОРИИ -->
        <div class="categories" id="categoriesContainer">
            <button class="active" data-cat="all">Все</button>
            <button data-cat="pvp">⚔️ PvP</button>
            <button data-cat="pve">🧟 PvE</button>
            <button data-cat="tools">⛏️ Инструменты</button>
            <button data-cat="weapons">🔫 Оружие</button>
            <button data-cat="armor">🛡️ Броня</button>
        </div>

        <!-- СЕТКА МОДОВ -->
        <div class="mods-grid" id="modsGrid"></div>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-nav">
        <div class="nav-item active"><span class="icon">🏠</span><span>Главная</span></div>
        <div class="nav-item" id="licenseBtn"><span class="icon">📄</span><span>Лицензия</span></div>
        <div class="nav-item" id="cookiesBtn"><span class="icon">🍪</span><span>Куки</span></div>
        <div class="nav-item" id="profileNav"><span class="icon">👤</span><span>Профиль</span></div>
    </div>

    <!-- ПОПАП ЛИЦЕНЗИЯ / КУКИ -->
    <div class="popup" id="popup">
        <h4 id="popupTitle">Лицензионное соглашение</h4>
        <p id="popupText">Все моды предоставляются «как есть». Использование модов осуществляется на ваш страх и риск. Автор не несёт ответственности за возможные проблемы.</p>
        <div class="btn-row">
            <button class="accept" id="popupAccept">Принять</button>
            <button class="decline" id="popupDecline">Закрыть</button>
        </div>
    </div>

    <script>
        // ==== ДАННЫЕ МОДОВ ====
        const mods = [
            { id: 1, name: "Hitboxes Mod", category: "pvp", icon: "🎯", desc: "Показывает хитбоксы игроков и мобов.", file: "#" },
            { id: 2, name: "OptiFine", category: "tools", icon: "⚡", desc: "Оптимизирует FPS и графику.", file: "#" },
            { id: 3, name: "Zoom Mod", category: "weapons", icon: "🔍", desc: "Увеличивает изображение при нажатии.", file: "#" },
            { id: 4, name: "X-Ray Textures", category: "tools", icon: "🕳️", desc: "Показывает руду сквозь камень.", file: "#" },
            { id: 5, name: "PvP Tracker", category: "pvp", icon: "🏹", desc: "Отслеживает урон и здоровье.", file: "#" },
            { id: 6, name: "Mob Slayer", category: "pve", icon: "⚔️", desc: "Увеличивает урон по мобам.", file: "#" },
            { id: 7, name: "Diamond Finder", category: "tools", icon: "💎", desc: "Подсвечивает алмазы.", file: "#" },
            { id: 8, name: "Armor Plus", category: "armor", icon: "🛡️", desc: "Новые виды брони с эффектами.", file: "#" },
            { id: 9, name: "Better FPS", category: "tools", icon: "🚀", desc: "Увеличивает производительность.", file: "#" },
            { id: 10, name: "Zoom+", category: "weapons", icon: "🔭", desc: "Улучшенный зум для стрельбы.", file: "#" }
        ];

        // ==== РЕНДЕР МОДОВ ====
        function renderMods(category = 'all') {
            const grid = document.getElementById('modsGrid');
            const filtered = category === 'all' ? mods : mods.filter(m => m.category === category);
            grid.innerHTML = filtered.map(m => `
                <div class="mod-card">
                    <div class="icon">${m.icon}</div>
                    <div class="info">
                        <div class="name">${m.name}</div>
                        <div class="desc">${m.desc}</div>
                    </div>
                    <button class="download-btn" data-file="${m.file}">⬇ Скачать</button>
                </div>
            `).join('');

            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    alert('✅ Мод будет скачан. Функция в разработке.');
                });
            });
        }

        // ==== КАТЕГОРИИ ====
        document.querySelectorAll('.categories button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderMods(this.dataset.cat);
            });
        });

        // ==== ПОПАПЫ ====
        function showPopup(title, text) {
            document.getElementById('popupTitle').textContent = title;
            document.getElementById('popupText').textContent = text;
            document.getElementById('popup').classList.add('show');
        }
        document.getElementById('popupAccept').addEventListener('click', () => {
            document.getElementById('popup').classList.remove('show');
        });
        document.getElementById('popupDecline').addEventListener('click', () => {
            document.getElementById('popup').classList.remove('show');
        });

        document.getElementById('licenseBtn').addEventListener('click', () => {
            showPopup('📄 Лицензионное соглашение', 'Все моды предоставляются «как есть». Автор не несёт ответственности за возможные проблемы при использовании.');
        });
        document.getElementById('cookiesBtn').addEventListener('click', () => {
            showPopup('🍪 Использование куки', 'Этот сайт использует локальные куки для хранения настроек темы и профиля. Данные не передаются третьим лицам.');
        });

        // ==== ПРОФИЛЬ (демо-авторизация) ====
        let isLogged = false;
        document.getElementById('loginBtn').addEventListener('click', function() {
            if (!isLogged) {
                const name = prompt('Введите ваш ник (или оставьте "Гость"):');
                if (name !== null) {
                    const finalName = name.trim() || 'Гость';
                    document.getElementById('userName').textContent = finalName;
                    document.getElementById('userStatus').textContent = '✅ Активен';
                    document.getElementById('avatarDisplay').textContent = finalName[0].toUpperCase();
                    this.textContent = 'Выйти';
                    isLogged = true;
                }
            } else {
                document.getElementById('userName').textContent = 'Гость';
                document.getElementById('userStatus').textContent = 'Не авторизован';
                document.getElementById('avatarDisplay').textContent = 'M';
                this.textContent = 'Войти';
                isLogged = false;
            }
        });

        document.getElementById('profileNav').addEventListener('click', () => {
            const name = document.getElementById('userName').textContent;
            alert(`👤 Ваш профиль\nНик: ${name}\nСтатус: ${isLogged ? 'В сети' : 'Офлайн'}`);
        });

        // ==== СТАРТ ====
        renderMods('all');

        // ==== ПРИВЕТСТВЕННЫЙ ПОПАП (первый визит) ====
        if (!localStorage.getItem('mrlaifon_popup_shown')) {
            setTimeout(() => {
                showPopup('👋 Добро пожаловать!', 'Это лаунчер Mrlaifon. Здесь ты найдёшь моды для Minecraft. Для начала войди в профиль.');
                localStorage.setItem('mrlaifon_popup_shown', 'true');
            }, 400);
        }
    </script>
</body>
</html>
