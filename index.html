<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mrlaifon — моды</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0b1a;
            color: #e0e0f0;
            min-height: 100vh;
            padding: 16px 16px 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app {
            max-width: 500px;
            width: 100%;
            background: #12122a;
            border-radius: 32px;
            padding: 20px 16px 16px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.6);
            border: 1px solid #2a2a5a;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1f1f42;
        }
        .header .title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #f7c948, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .badge {
            background: #1f1f3a;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #8a8aaa;
            border: 1px solid #2f2f5a;
        }
        .profile {
            background: #1a1a36;
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            border: 1px solid #2a2a5a;
        }
        .profile .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7c948, #f39c12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #0b0b1a;
            flex-shrink: 0;
        }
        .profile .info { flex: 1; }
        .profile .info .name { font-weight: 600; font-size: 15px; }
        .profile .info .status { font-size: 12px; color: #7a7aaa; }
        .profile .login-btn {
            background: #2a4a8a;
            border: none;
            color: #fff;
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .profile .login-btn:active { transform: scale(0.94); }

        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            margin-bottom: 16px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories::-webkit-scrollbar { display: none; }
        .categories button {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #2a2a5a;
            background: #161632;
            color: #a0a0c0;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .categories button.active {
            background: #2a4a8a;
            border-color: #4a7ac0;
            color: #fff;
            box-shadow: 0 0 20px rgba(60,100,255,0.2);
        }
        .categories button:active { transform: scale(0.96); }

        .mods-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .mod-card {
            background: #161632;
            border-radius: 20px;
            padding: 14px 16px;
            border: 1px solid #22224a;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .mod-card:active { transform: scale(0.98); }
        .mod-card .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: #1f1f42;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            border: 1px solid #2a2a5a;
        }
        .mod-card .info { flex: 1; min-width: 0; }
        .mod-card .info .name { font-weight: 600; font-size: 15px; }
        .mod-card .info .desc { font-size: 12px; color: #8a8aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mod-card .download-btn {
            background: #2a6a4a;
            border: none;
            color: #fff;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .mod-card .download-btn:active { transform: scale(0.94); }

        .mod-detail {
            background: #1a1a36;
            border-radius: 20px;
            padding: 18px;
            margin-top: 12px;
            border: 1px solid #2a2a5a;
            display: none;
        }
        .mod-detail.show { display: block; }
        .mod-detail .big-icon { font-size: 48px; text-align: center; margin-bottom: 6px; }
        .mod-detail .big-name { font-weight: 700; font-size: 20px; text-align: center; }
        .mod-detail .big-version { text-align: center; font-size: 13px; color: #7a8aaa; margin-bottom: 6px; }
        .mod-detail .big-desc { color: #b0b0d0; font-size: 14px; text-align: center; margin: 8px 0 14px; line-height: 1.5; }
        .mod-detail .big-download {
            display: block;
            width: 100%;
            padding: 12px;
            background: #2a6a4a;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .mod-detail .big-download:active { transform: scale(0.96); }
        .mod-detail .close-detail {
            display: block;
            width: 100%;
            padding: 10px;
            background: #2a2a5a;
            border: none;
            border-radius: 30px;
            color: #8a8aaa;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            text-align: center;
        }
        .mod-detail .specs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
        }
        .mod-detail .specs span {
            background: #1f1f42;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #8a8aaa;
            border: 1px solid #2a2a5a;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111128;
            border-top: 1px solid #1f1f42;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5a5a8a;
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .bottom-nav .nav-item .icon { font-size: 20px; }
        .bottom-nav .nav-item.active { color: #f7c948; }
        @media (max-width: 380px) {
            .header .title { font-size: 18px; }
            .mod-card .icon { width: 44px; height: 44px; font-size: 22px; }
            .mod-card .info .name { font-size: 14px; }
            .mod-card .download-btn { font-size: 11px; padding: 4px 12px; }
        }
    </style>
</head>

            { id: 32, name: "Dramatic Skys", category: "texture", icon: "🌅", desc: "Красивое небо.", longDesc: "Реалистичные облака.", file: "https://www.planetminecraft.com/texture-pack/dramatic-skys-1-16-2-1-16-5/", version: "1.16.5", specs: ["Текстурпак", "Небо", "Реализм"] }
        ];

        // ==== СТАТИСТИКА ====
        let stats = JSON.parse(localStorage.getItem('mrlaifon_stats')) || { visits: 0, downloads: 0 };

        function updateStats() {
            if (!localStorage.getItem('mrlaifon_visited')) {
                stats.visits += 1;
                localStorage.setItem('mrlaifon_visited', 'true');
                localStorage.setItem('mrlaifon_stats', JSON.stringify(stats));
            }
        }
        updateStats();

        function recordDownload() {
            stats.downloads += 1;
            localStorage.setItem('mrlaifon_stats', JSON.stringify(stats));
        }

        // ==== РЕНДЕР ====
        function renderMods(category = 'all') {
            const grid = document.getElementById('modsGrid');
            const filtered = category === 'all' ? mods : mods.filter(m => m.category === category);
            grid.innerHTML = filtered.map(m => `
                <div class="mod-card" data-id="${m.id}">
                    <div class="icon">${m.icon}</div>
                    <div class="info">
                        <div class="name">${m.name}</div>
                        <div class="desc">${m.desc}</div>
                    </div>
                    <button class="download-btn" data-file="${m.file}">⬇ Скачать</button>
                </div>
            `).join('');

            document.querySelectorAll('.mod-card .download-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const card = this.closest('.mod-card');
                    const id = parseInt(card.dataset.id);
                    const mod = mods.find(m => m.id === id);
                    if (mod) {
                        recordDownload();
                        showDetail(mod);
                    }
                });
            });

            document.querySelectorAll('.mod-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const mod = mods.find(m => m.id === id);
                    if (mod) showDetail(mod);
                });
            });
        }

        // ==== ДЕТАЛИ ====
        function showDetail(mod) {
            document.getElementById('detailIcon').textContent = mod.icon;
            document.getElementById('detailName').textContent = mod.name;
            document.getElementById('detailVersion').textContent = `📌 Версия: ${mod.version}`;
            document.getElementById('detailDesc').textContent = mod.longDesc || mod.desc;
            document.getElementById('detailSpecs').innerHTML = mod.specs.map(s => `<span>${s}</span>`).join('');
            document.getElementById('detailDownload').onclick = function() {
                if (mod.file !== '#') {
                    window.open(mod.file, '_blank');
                } else {
                    alert('⚠️ Ссылка на этот мод временно недоступна. Проверьте позже.');
                }
                recordDownload();
            };
            document.getElementById('modDetail').classList.add('show');
            document.getElementById('modDetail').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.getElementById('closeDetail').addEventListener('click', () => {
            document.getElementById('modDetail').classList.remove('show');
        });

        // ==== КАТЕГОРИИ ====
        document.querySelectorAll('.categories button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderMods(this.dataset.cat);
                document.getElementById('modDetail').classList.remove('show');
            });
        });

        // ==== ПРОФИЛЬ ====
        let isLogged = false;
        document.getElementById('loginBtn').addEventListener('click', function() {
            if (!isLogged) {
                const name = prompt('Введите ваш ник:');
                if (name && name.trim()) {
                    document.querySelector('.profile .name').textContent = name.trim();
                    document.querySelector('.profile .status').textContent = '✅ В сети';
                    this.textContent = 'Выйти';
                    isLogged = true;
                }
            } else {
                document.querySelector('.profile .name').textContent = 'Гость';
                document.querySelector('.profile .status').textContent = '👋 Добро пожаловать';
                this.textContent = 'Войти';
                isLogged = false;
            }
        });

        document.getElementById('profileNav').addEventListener('click', () => {
            const name = document.querySelector('.profile .name').textContent;
            alert(
                `👤 ПРОФИЛЬ\n\n` +
                `Ник: ${name}\n` +
                `Статус: ${isLogged ? 'В сети' : 'Офлайн'}\n\n` +
                `📊 СТАТИСТИКА САЙТА:\n` +
                `👀 Посещений: ${stats.visits}\n` +
                `📥 Скачиваний: ${stats.downloads}`
            );
        });

        // ==== СТАРТ ====
        renderMods('all');
    </script>
</body>
</html>
