<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrlaifon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 0; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        body.dark { background: #18191a; color: #e4e6eb; }

        .container { max-width: 700px; width: 100%; margin: 0 auto; background: #fff; flex: 1; display: flex; flex-direction: column; padding: 16px 16px 80px; position: relative; }
        body.dark .container { background: #242526; }

        .hidden { display: none !important; }

        /* АВТОРИЗАЦИЯ */
        .auth { display: flex; flex-direction: column; gap: 10px; padding: 20px 0; }
        .auth input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; background: #fff; }
        body.dark .auth input { background: #3a3b3c; color: #e4e6eb; border-color: #3e3f40; }
        .auth button { padding: 12px; background: #2b7cf7; color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }

        /* НИЖНЯЯ ПАНЕЛЬ (всегда внизу) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 700px; margin: 0 auto; display: flex; justify-content: space-around; padding: 10px 0; background: #fff; border-top: 1px solid #ddd; z-index: 1000; }
        body.dark .bottom-nav { background: #242526; border-top-color: #3e3f40; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #65676b; font-size: 12px; transition: 0.2s; padding: 4px 0; flex: 1; }
        body.dark .nav-item { color: #b0b3b8; }
        .nav-item.active { color: #2b7cf7; }
        .nav-item .icon { font-size: 24px; line-height: 1.2; }
        .nav-item span { font-size: 11px; margin-top: 2px; }

        /* СТРАНИЦЫ */
        .page { display: none; flex: 1; }
        .page.active { display: block; }

        /* ЛЕНТА */
        .feed { margin-top: 12px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 16px; }
        .post { background: #fff; border-radius: 12px; padding: 14px; border: 1px solid #e4e6eb; }
        body.dark .post { background: #3a3b3c; border-color: #3e3f40; }

        .post-header { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2b7cf7; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 18px; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-name { font-weight: 600; }
        .post-time { font-size: 12px; color: #65676b; margin-left: 8px; }
        body.dark .post-time { color: #b0b3b8; }
        .post-text { margin: 8px 0; word-break: break-word; }
        .post-img { max-width: 100%; border-radius: 10px; margin: 6px 0; max-height: 400px; object-fit: cover; }

        .post-actions { display: flex; gap: 16px; border-top: 1px solid #e4e6eb; padding-top: 8px; margin-top: 8px; flex-wrap: wrap; }
        body.dark .post-actions { border-top-color: #3e3f40; }
        .action-btn { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #65676b; font-size: 14px; transition: 0.2s; }
        body.dark .action-btn { color: #b0b3b8; }
        .action-btn.liked { color: #e74c3c; }
        .action-btn .count { font-size: 13px; }
        .action-btn.delete { color: #e74c3c; margin-left: auto; }

        .comments-area { margin-top: 8px; border-top: 1px solid #e4e6eb; padding-top: 8px; }
        body.dark .comments-area { border-top-color: #3e3f40; }
        .comment { display: flex; gap: 8px; margin: 4px 0; font-size: 14px; }
        .comment .c-name { font-weight: 500; }
        .comment-input { display: flex; gap: 6px; margin-top: 6px; }
        .comment-input input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #ddd; font-size: 14px; background: #fff; }
        body.dark .comment-input input { background: #3a3b3c; color: #e4e6eb; border-color: #3e3f40; }
        .comment-input button { padding: 8px 14px; border-radius: 20px; border: none; background: #2b7cf7; color: #fff; cursor: pointer; }

        /* АККАУНТ */
        .profile-settings { display: flex; flex-direction: column; gap: 12px; }
        .profile-settings .avatar-upload { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .profile-settings .avatar-upload .avatar.large { width: 64px; height: 64px; font-size: 28px; cursor: pointer; flex-shrink: 0; }
        .profile-settings input { padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; background: #fff; }
        body.dark .profile-settings input { background: #3a3b3c; color: #e4e6eb; border-color: #3e3f40; }
        .profile-settings button { padding: 12px; background: #2b7cf7; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
        .profile-settings .logout { background: #e74c3c; margin-top: 8px; }

        /* НАСТРОЙКИ */
        .settings-panel { display: flex; flex-direction: column; gap: 12px; }
        .theme-toggle { display: flex; gap: 10px; }
        .theme-toggle button { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; background: #fff; }
        body.dark .theme-toggle button { background: #3a3b3c; color: #e4e6eb; border-color: #3e3f40; }
        .theme-toggle .active { background: #2b7cf7; color: #fff; border-color: #2b7cf7; }

        /* ПОСТ + ФОТО */
        .upload-btn { background: #2b7cf7; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
        .flex-row input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; font-size: 16px; background: #fff; }
        body.dark .flex-row input[type="text"] { background: #3a3b3c; color: #e4e6eb; border-color: #3e3f40; }
        .flex-row .file-label { cursor: pointer; background: #e4e6eb; padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        body.dark .flex-row .file-label { background: #3a3b3c; color: #e4e6eb; }
        .flex-row button { padding: 10px 20px; border-radius: 20px; border: none; background: #2b7cf7; color: #fff; cursor: pointer; }
        .center { text-align: center; color: #888; padding: 20px 0; }
    </style>
</head>
<body>
<div class="container" id="app">

    <!-- АВТОРИЗАЦИЯ -->
    <div id="authBlock" class="auth">
        <h2>Добро пожаловать</h2>
        <input type="text" id="loginInput" placeholder="Логин">
        <input type="password" id="passInput" placeholder="Пароль">
        <button id="loginBtn">Войти / Зарегистрироваться</button>
        <span id="authStatus" style="color:red;font-size:14px;"></span>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="mainBlock" class="hidden">

        <!-- СТРАНИЦА: ГЛАВНАЯ -->
        <div id="pageFeed" class="page active">
            <div class="flex-row">
                <input type="text" id="postInput" placeholder="Что нового?">
                <label class="file-label" for="fileInput">📸 Фото</label>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
                <button id="postBtn">📤</button>
            </div>
            <div id="feed" class="feed"></div>
        </div>

        <!-- СТРАНИЦА: АККАУНТ -->
        <div id="pageAccount" class="page">
            <div class="profile-settings">
                <h3>Мой аккаунт</h3>
                <div class="avatar-upload">
                    <div class="avatar large" id="profileAvatar">👤</div>
                    <div><input type="file" id="avatarInput" accept="image/*" style="display:none;"><label for="avatarInput" style="cursor:pointer;color:#2b7cf7;">📸 Изменить фото</label></div>
                </div>
                <input type="text" id="profileNameInput" placeholder="Ваш ник (как в Telegram)">
                <button id="saveProfileBtn">Сохранить профиль</button>
                <button id="logoutBtn" class="logout">Выйти</button>
            </div>
        </div>

        <!-- СТРАНИЦА: НАСТРОЙКИ -->
        <div id="pageSettings" class="page">
            <div class="settings-panel">
                <h3>Настройки</h3>
                <div class="theme-toggle">
                    <button id="themeLight" class="active">☀️ Светлая</button>
                    <button id="themeDark">🌙 Тёмная</button>
                </div>
                <p style="font-size:14px;color:#888;">Версия 1.1</p>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" data-page="pageFeed"><span class="icon">🏠</span><span>Главная</span></div>
        <div class="nav-item" data-page="pageAccount"><span class="icon">👤</span><span>Аккаунт</span></div>
        <div class="nav-item" data-page="pageSettings"><span class="icon">⚙️</span><span>Настройки</span></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'mrlaifon_data';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { users: {}, currentUser: null, theme: 'light' };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    function applyTheme(theme) {
        document.body.classList.toggle('dark', theme === 'dark');
        document.getElementById('themeLight').classList.toggle('active', theme === 'light');
        document.getElementById('themeDark').classList.toggle('active', theme === 'dark');
    }

    function renderFeed() {
        const feed = document.getElementById('feed');
        const currentUser = data.currentUser;
        const users = data.users;
        if (!currentUser || !users[currentUser]) {
            feed.innerHTML = '<div class="center">Войдите, чтобы видеть посты</div>';
            return;
        }

        let allPosts = [];
        for (const [login, u] of Object.entries(users)) {
            if (u.posts) {
                u.posts.forEach(p => {
                    allPosts.push({ ...p, author: login, authorName: u.name || login, avatar: u.avatar || null });
                });
            }
        }
        allPosts.sort((a,b) => new Date(b.time) - new Date(a.time));

        if (!allPosts.length) {
            feed.innerHTML = '<div class="center">Пока нет постов. Будьте первым!</div>';
            return;
        }

        feed.innerHTML = allPosts.map(p => {
            const liked = p.likes && p.likes.includes(currentUser);
            const likesCount = p.likes ? p.likes.length : 0;
            const comments = p.comments || [];
            const isAuthor = p.author === currentUser;
            const views = p.views || 0;

            return `
            <div class="post" data-id="${p.id || ''}">
                <div class="post-header">
                    <div class="avatar">${p.avatar ? `<img src="${p.avatar}">` : (p.authorName[0] || '?')}</div>
                    <div><span class="post-name">${p.authorName}</span><span class="post-time">${p.time}</span></div>
                </div>
                <div class="post-text">${p.text}</div>
                ${p.img ? `<img src="${p.img}" class="post-img" alt="photo">` : ''}
                <div style="font-size:12px;color:#888;margin:4px 0;">👁 ${views}</div>
                <div class="post-actions">
                    <span class="action-btn like-btn ${liked ? 'liked' : ''}" data-author="${p.author}" data-time="${p.time}">
                        ${liked ? '❤️' : '🤍'} <span class="count">${likesCount}</span>
                    </span>
                    <span class="action-btn comment-toggle" style="cursor:pointer;">💬 <span class="count">${comments.length}</span></span>
                    ${isAuthor ? `<span class="action-btn delete" data-author="${p.author}" data-time="${p.time}">🗑️ Удалить</span>` : ''}
                </div>
                <div class="comments-area" style="display:none;">
                    ${comments.map(c => `<div class="comment"><span class="c-name">${c.authorName}:</span> ${c.text}</div>`).join('')}
                    <div class="comment-input">
                        <input type="text" placeholder="Напишите комментарий..." class="comment-text">
                        <button class="comment-submit" data-author="${p.author}" data-time="${p.time}">➤</button>
                    </div>
                </div>
            </div>
            `;
        }).join('');

        // Лайки
        document.querySelectorAll('.like-btn').forEach(el => {
            el.onclick = function() {
                const author = this.dataset.author;
                const time = this.dataset.time;
                const user = data.currentUser;
                if (!user) return;
                const post = data.users[author]?.posts?.find(p => p.time === time);
                if (!post) return;
                if (!post.likes) post.likes = [];
                const idx = post.likes.indexOf(user);
                if (idx > -1) post.likes.splice(idx, 1);
                else post.likes.push(user);
                save();
                renderFeed();
            };
        });

        // Комментарии (показать/скрыть)
        document.querySelectorAll('.comment-toggle').forEach(el => {
            el.onclick = function() {
                const area = this.closest('.post').querySelector('.comments-area');
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
            };
        });

        // Отправка комментариев
        document.querySelectorAll('.comment-submit').forEach(el => {
            el.onclick = function() {
                const author = this.dataset.author;
                const time = this.dataset.time;
                const input = this.closest('.comment-input').querySelector('.comment-text');
                const text = input.value.trim();
                if (!text || !data.currentUser) return;
                const post = data.users[author]?.posts?.find(p => p.time === time);
                if (!post) return;
                if (!post.comments) post.comments = [];
                post.comments.push({ author: data.currentUser, authorName: data.users[data.currentUser].name || data.currentUser, text });
                save();
                renderFeed();
            };
        });

        // Удаление поста
        document.querySelectorAll('.delete').forEach(el => {
            el.onclick = function() {
                const author = this.dataset.author;
                const time = this.dataset.time;
                if (!confirm('Удалить пост?')) return;
                const userPosts = data.users[author]?.posts;
                if (!userPosts) return;
                const idx = userPosts.findIndex(p => p.time === time);
                if (idx > -1) userPosts.splice(idx, 1);
                save();
                renderFeed();
            };
        });
    }

    function updateUI() {
        const auth = document.getElementById('authBlock');
        const main = document.getElementById('mainBlock');
        if (data.currentUser && data.users[data.currentUser]) {
            auth.classList.add('hidden');
            main.classList.remove('hidden');
            const user = data.users[data.currentUser];
            document.getElementById('profileNameInput').value = user.name || '';
            const avatarEl = document.getElementById('profileAvatar');
            if (user.avatar) avatarEl.innerHTML = `<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            else avatarEl.textContent = user.name ? user.name[0].toUpperCase() : '👤';
            renderFeed();
            applyTheme(data.theme || 'light');
        } else {
            auth.classList.remove('hidden');
            main.classList.add('hidden');
        }
    }

    // Авторизация
    document.getElementById('loginBtn').onclick = function() {
        const login = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const status = document.getElementById('authStatus');
        if (!login || !pass) { status.textContent = 'Заполните оба поля'; return; }
        if (data.users[login]) {
            if (data.users[login].password === pass) {
                data.currentUser = login;
                save();
                status.textContent = '';
                updateUI();
            } else { status.textContent = 'Неверный пароль'; }
        } else {
            data.users[login] = { password: pass, name: login, posts: [], avatar: null };
            data.currentUser = login;
            save();
            status.textContent = '';
            updateUI();
        }
    };

    // Навигация
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = function() {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(this.dataset.page).classList.add('active');
        };
    });

    // Пост с фото
    document.getElementById('postBtn').onclick = function() {
        const input = document.getElementById('postInput');
        const text = input.value.trim() || '📸 Без текста';
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!data.currentUser) return;

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const user = data.users[data.currentUser];
                if (!user.posts) user.posts = [];
                user.posts.push({ text: text, time: new Date().toLocaleString(), likes: [], comments: [], id: Date.now(), img: e.target.result, views: 0 });
                save();
                renderFeed();
                input.value = '';
                fileInput.value = '';
            };
            reader.readAsDataURL(file);
        } else {
            const user = data.users[data.currentUser];
            if (!user.posts) user.posts = [];
            user.posts.push({ text: text, time: new Date().toLocaleString(), likes: [], comments: [], id: Date.now(), img: null, views: 0 });
            save();
            renderFeed();
            input.value = '';
        }
    };

    // Сохранение профиля
    document.getElementById('saveProfileBtn').onclick = function() {
        if (!data.currentUser) return;
        const name = document.getElementById('profileNameInput').value.trim() || data.currentUser;
        data.users[data.currentUser].name = name;
        save();
        updateUI();
    };

    // Аватарка
    document.getElementById('avatarInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file || !data.currentUser) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            data.users[data.currentUser].avatar = ev.target.result;
            save();
            updateUI();
        };
        reader.readAsDataURL(file);
    };
    document.getElementById('profileAvatar').onclick = function() { document.getElementById('avatarInput').click(); };

    // Выход
    document.getElementById('logoutBtn').onclick = function() {
        data.currentUser = null;
        save();
        updateUI();
    };

    // Темы
    document.getElementById('themeLight').onclick = function() { data.theme = 'light'; save(); applyTheme('light'); };
    document.getElementById('themeDark').onclick = function() { data.theme = 'dark'; save(); applyTheme('dark'); };

    // Старт
    updateUI();
</script>
</body>
                </html>
