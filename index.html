<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mrlaifon — техника и моды</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0b1a;
            color: #e0e0f0;
            min-height: 100vh;
            padding: 16px 16px 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app {
            max-width: 500px;
            width: 100%;
            background: #12122a;
            border-radius: 32px;
            padding: 20px 16px 16px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.6);
            border: 1px solid #2a2a5a;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1f1f42;
        }
        .header .title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #f7c948, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .badge {
            background: #1f1f3a;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #8a8aaa;
            border: 1px solid #2f2f5a;
        }
        .profile {
            background: #1a1a36;
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            border: 1px solid #2a2a5a;
        }
        .profile .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7c948, #f39c12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #0b0b1a;
            flex-shrink: 0;
        }
        .profile .info { flex: 1; }
        .profile .info .name { font-weight: 600; font-size: 15px; }
        .profile .info .status { font-size: 12px; color: #7a7aaa; }
        .profile .login-btn {
            background: #2a4a8a;
            border: none;
            color: #fff;
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .profile .login-btn:active { transform: scale(0.94); }

        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            margin-bottom: 16px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories::-webkit-scrollbar { display: none; }
        .categories button {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #2a2a5a;
            background: #161632;
            color: #a0a0c0;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .categories button.active {
            background: #2a4a8a;
            border-color: #4a7ac0;
            color: #fff;
            box-shadow: 0 0 20px rgba(60,100,255,0.2);
        }
        .categories button:active { transform: scale(0.96); }

        .mods-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .mod-card {
            background: #161632;
            border-radius: 20px;
            padding: 14px 16px;
            border: 1px solid #22224a;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .mod-card:active { transform: scale(0.98); }
        .mod-card .icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: #1f1f42;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            border: 1px solid #2a2a5a;
        }
        .mod-card .info { flex: 1; min-width: 0; }
        .mod-card .info .name { font-weight: 600; font-size: 15px; }
        .mod-card .info .desc { font-size: 12px; color: #8a8aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mod-card .download-btn {
            background: #2a6a4a;
            border: none;
            color: #fff;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .mod-card .download-btn:active { transform: scale(0.94); }

        .mod-detail {
            background: #1a1a36;
            border-radius: 20px;
            padding: 18px;
            margin-top: 12px;
            border: 1px solid #2a2a5a;
            display: none;
        }
        .mod-detail.show { display: block; }
        .mod-detail .big-icon { font-size: 48px; text-align: center; margin-bottom: 6px; }
        .mod-detail .big-name { font-weight: 700; font-size: 20px; text-align: center; }
        .mod-detail .big-version { text-align: center; font-size: 13px; color: #7a8aaa; margin-bottom: 6px; }
        .mod-detail .big-desc { color: #b0b0d0; font-size: 14px; text-align: center; margin: 8px 0 14px; line-height: 1.5; }
        .mod-detail .big-download {
            display: block;
            width: 100%;
            padding: 12px;
            background: #2a6a4a;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .mod-detail .big-download:active { transform: scale(0.96); }
        .mod-detail .close-detail {
            display: block;
            width: 100%;
            padding: 10px;
            background: #2a2a5a;
            border: none;
            border-radius: 30px;
            color: #8a8aaa;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            text-align: center;
        }
        .mod-detail .specs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
        }
        .mod-detail .specs span {
            background: #1f1f42;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #8a8aaa;
            border: 1px solid #2a2a5a;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111128;
            border-top: 1px solid #1f1f42;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5a5a8a;
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .bottom-nav .nav-item .icon { font-size: 20px; }
        .bottom-nav .nav-item.active { color: #f7c948; }
        @media (max-width: 380px) {
            .header .title { font-size: 18px; }
            .mod-card .icon { width: 44px; height: 44px; font-size: 22px; }
            .mod-card .info .name { font-size: 14px; }
            .mod-card .download-btn { font-size: 11px; padding: 4px 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <span class="title">⚡ Mrlaifon</span>
            <span class="badge">📦 техника + моды</span>
        </div>
        <div class="profile">
            <div class="avatar">M</div>
            <div class="info">
                <div class="name">Гость</div>
                <div class="status">👋 Добро пожаловать</div>
            </div>
            <button class="login-btn" id="loginBtn">Войти</button>
        </div>
        <div class="categories">
            <button class="active" data-cat="all">Все</button>
            <button data-cat="tech">⚙️ Техника</button>
            <button data-cat="trains">🚂 Поезда</button>
            <button data-cat="factory">🏭 Заводы</button>
            <button data-cat="tools">⛏️ Инструменты</button>
            <button data-cat="world">🌍 Мир</button>
            <button data-cat="pvp">⚔️ PvP</button>
            <button data-cat="texture">🎨 Текстурпаки</button>
            <button data-cat="magic">✨ Магия</button>
        </div>
        <div class="mods-grid" id="modsGrid"></div>
        <div class="mod-detail" id="modDetail">
            <div class="big-icon" id="detailIcon">🎯</div>
            <div class="big-name" id="detailName">Название</div>
            <div class="big-version" id="detailVersion">Версия: 1.16.5</div>
            <div class="big-desc" id="detailDesc">Описание</div>
            <div class="specs" id="detailSpecs"></div>
            <button class="big-download" id="detailDownload">⬇ Скачать мод</button>
            <button class="close-detail" id="closeDetail">✕ Закрыть</button>
        </div>
    </div>
    <div class="bottom-nav">
        <div class="nav-item active"><span class="icon">🏠</span><span>Главная</span></div>
        <div class="nav-item" id="profileNav"><span class="icon">👤</span><span>Профиль</span></div>
    </div>

    <script>
        // ===== МОДЫ: ТЕХНИКА, ПОЕЗДА, ЗАВОДЫ, ТЕКСТУРПАКИ =====
        const mods = [
            // ===== ТЕХНИКА =====
            { id: 1, name: "Create", category: "tech", icon: "⚙️", desc: "Механизмы и автоматизация.", longDesc: "Создавай конвейеры, шестерни, поезда и автоматизируй всё.", file: "https://www.curseforge.com/minecraft/mc-mods/create", version: "1.16.5", specs: ["Автоматизация", "Forge", "Механизмы"] },
            { id: 2, name: "Mekanism", category: "tech", icon: "⚡", desc: "Мощная технология.", longDesc: "Генераторы, ядерная энергия, лазеры и оружие.", file: "https://www.curseforge.com/minecraft/mc-mods/mekanism", version: "1.16.5", specs: ["Энергия", "Forge", "Оружие"] },
            { id: 3, name: "Thermal Expansion", category: "tech", icon: "🔥", desc: "Термальное расширение.", longDesc: "Переработка руды, генерация энергии и машины.", file: "https://www.curseforge.com/minecraft/mc-mods/thermal-expansion", version: "1.16.5", specs: ["Энергия", "Forge", "Переработка"] },
            { id: 4, name: "Ender IO", category: "tech", icon: "🌀", desc: "Провода и машины.", longDesc: "Автоматизация, логистика и мощные провода.", file: "https://www.curseforge.com/minecraft/mc-mods/ender-io", version: "1.16.5", specs: ["Автоматизация", "Forge", "Логистика"] },
            { id: 5, name: "Industrial Foregoing", category: "tech", icon: "🏭", desc: "Промышленность.", longDesc: "Добыча ресурсов, разведение мобов и автоматизация.", file: "https://www.curseforge.com/minecraft/mc-mods/industrial-foregoing", version: "1.16.5", specs: ["Промышленность", "Forge", "Добыча"] },
            { id: 6, name: "Immersive Engineering", category: "tech", icon: "⚡", desc: "Инженерные машины.", longDesc: "Мультиблочные структуры, провода и генераторы.", file: "https://www.curseforge.com/minecraft/mc-mods/immersive-engineering", version: "1.16.5", specs: ["Инженерия", "Forge", "Мультиблоки"] },

            // ===== ПОЕЗДА =====
            { id: 7, name: "Immersive Railroading", category: "trains", icon: "🚂", desc: "Настоящие поезда.", longDesc: "Добавляет реалистичные локомотивы и вагоны.", file: "https://www.curseforge.com/minecraft/mc-mods/immersive-railroading", version: "1.16.5", specs: ["Поезда", "Forge", "Реализм"] },
            { id: 8, name: "Railcraft", category: "trains", icon: "🛤️", desc: "Железные дороги.", longDesc: "Сложная система рельсов, вагонов и локомотивов.", file: "https://www.curseforge.com/minecraft/mc-mods/railcraft", version: "1.16.5", specs: ["Железная дорога", "Forge", "Рельсы"] },

            // ===== ЗАВОДЫ =====
            { id: 9, name: "Factory Tech", category: "factory", icon: "🏗️", desc: "Заводские процессы.", longDesc: "Многоступенчатое производство и автоматизация.", file: "https://www.curseforge.com/minecraft/mc-mods/factory-tech", version: "1.16.5", specs: ["Завод", "Forge", "Производство"] },
            { id: 10, name: "GregTech", category: "factory", icon: "🔧", desc: "Сложная инженерия.", longDesc: "Глубокая переработка, сложные цепи производства.", file: "https://www.curseforge.com/minecraft/mc-mods/gregtech", version: "1.16.5", specs: ["Инженерия", "Forge", "Сложно"] },

            // ===== ИНСТРУМЕНТЫ =====
            { id: 11, name: "Mouse Tweaks", category: "tools", icon: "🖱️", desc: "Упрощает инвентарь.", longDesc: "Быстрое перемещение предметов.", file: "https://www.curseforge.com/minecraft/mc-mods/mouse-tweaks", version: "1.16.5", specs: ["Утилита", "Forge", "Инвентарь"] },
            { id: 12, name: "JourneyMap", category: "tools", icon: "🗺️", desc: "Карта мира.", longDesc: "Карта в реальном времени с маркерами.", file: "https://www.curseforge.com/minecraft/mc-mods/journeymap", version: "1.16.5", specs: ["Карта", "Forge", "Удобство"] },

            // ===== МИР =====
            { id: 13, name: "Biomes O' Plenty", category: "world", icon: "🌳", desc: "50+ новых биомов.", longDesc: "Уникальные биомы для исследования.", file: "https://www.curseforge.com/minecraft/mc-mods/biomes-o-plenty", version: "1.16.5", specs: ["Биомы", "Forge", "Мир"] },
            { id: 14, name: "Valhelsia Structures", category: "world", icon: "🏰", desc: "Здания и замки.", longDesc: "Генерация зданий и замков по миру.", file: "https://www.curseforge.com/minecraft/mc-mods/valhelsia-structures", version: "1.16.5", specs: ["Структуры", "Forge", "Мир"] },

            // ===== PVP =====
            { id: 15, name: "Hitboxes Mod", category: "pvp", icon: "🎯", desc: "Хитбоксы для PvP.", longDesc: "Показывает хитбоксы игроков и мобов.", file: "#", version: "1.16.5", specs: ["PvP", "Forge", "Хитбоксы"] },
            { id: 16, name: "Zoom Mod", category: "pvp", icon: "🔍", desc: "Зум для стрельбы.", longDesc: "Плавное увеличение для дальних выстрелов.", file: "#", version: "1.16.5", specs: ["PvP", "Зум", "Forge"] },

            // ===== ТЕКСТУРПАКИ (с реальными ссылками) =====
            { id: 17, name: "Faithful 32x", category: "texture", icon: "🎨", desc: "Классические HD-текстуры.", longDesc: "Улучшенные текстуры в 32x разрешении.", file: "https://www.curseforge.com/minecraft/texture-packs/faithful-32x", version: "1.16.5", specs: ["Текстурпак", "HD", "Оптимизация"] },
            { id: 18, name: "Dramatic Skys", category: "texture", icon: "🌅", desc: "Красивое небо.", longDesc: "Реалистичные облака и закаты.", file: "https://www.planetminecraft.com/texture-pack/dramatic-skys-1-16-2-1-16-5/", version: "1.16.5", specs: ["Текстурпак", "Небо", "Реализм"] },
            { id: 19, name: "LB Photo Realism", category: "texture", icon: "📸", desc: "Реалистичные текстуры.", longDesc: "Максимально реалистичные текстуры.", file: "https://www.curseforge.com/minecraft/texture-packs/lb-photo-realism", version: "1.16.5", specs: ["Текстурпак", "Реализм", "HD"] },
            { id: 20, name: "Chroma Hills", category: "texture", icon: "🌈", desc: "Цветные HD-текстуры.", longDesc: "Яркие и детализированные текстуры.", file: "https://www.curseforge.com/minecraft/texture-packs/chroma-hills", version: "1.16.5", specs: ["Текстурпак", "HD", "Цвет"] },
            { id: 21, name: "Simply Optimized", category: "texture", icon: "⚡", desc: "Оптимизация графики.", longDesc: "Улучшает производительность без потери качества.", file: "https://www.curseforge.com/minecraft/texture-packs/simply-optimized", version: "1.16.5", specs: ["Текстурпак", "Оптимизация", "FPS"] },

            // ===== МАГИЯ (только самые популярные) =====
            { id: 22, name: "Ars Nouveau", category: "magic", icon: "✨", desc: "Создай заклинания.", longDesc: "Гибкая система магии.", file: "https://www.curseforge.com/minecraft/mc-mods/ars-nouveau", version: "1.16.5", specs: ["Магия", "Forge", "Заклинания"] },
            { id: 23, name: "Botania", category: "magic", icon: "🌸", desc: "Магия цветов.", longDesc: "Техномагия природы.", file: "https://www.curseforge.com/minecraft/mc-mods/botania", version: "1.16.5", specs: ["Техномагия", "Forge", "Природа"] }
        ];

        // ==== СТАТИСТИКА ====
        let stats = JSON.parse(localStorage.getItem('mrlaifon_stats')) || { visits: 0, downloads: 0 };

        function updateStats() {
            if (!localStorage.getItem('mrlaifon_visited')) {
                stats.visits += 1;
                localStorage.setItem('mrlaifon_visited', 'true');
                localStorage.setItem('mrlaifon_stats', JSON.stringify(stats));
            }
        }
        updateStats();

        function recordDownload() {
            stats.downloads += 1;
            localStorage.setItem('mrlaifon_stats', JSON.stringify(stats));
        }

        // ==== РЕНДЕР ====
        function renderMods(category = 'all') {
            const grid = document.getElementById('modsGrid');
            const filtered = category === 'all' ? mods : mods.filter(m => m.category === category);
            grid.innerHTML = filtered.map(m => `
                <div class="mod-card" data-id="${m.id}">
                    <div class="icon">${m.icon}</div>
                    <div class="info">
                        <div class="name">${m.name}</div>
                        <div class="desc">${m.desc}</div>
                    </div>
                    <button class="download-btn" data-file="${m.file}">⬇ Скачать</button>
                </div>
            `).join('');

            document.querySelectorAll('.mod-card .download-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const card = this.closest('.mod-card');
                    const id = parseInt(card.dataset.id);
                    const mod = mods.find(m => m.id === id);
                    if (mod) {
                        recordDownload();
                        showDetail(mod);
                    }
                });
            });

            document.querySelectorAll('.mod-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const mod = mods.find(m => m.id === id);
                    if (mod) showDetail(mod);
                });
            });
        }

        // ==== ДЕТАЛИ ====
        function showDetail(mod) {
            document.getElementById('detailIcon').textContent = mod.icon;
            document.getElementById('detailName').textContent = mod.name;
            document.getElementById('detailVersion').textContent = `📌 Версия: ${mod.version}`;
            document.getElementById('detailDesc').textContent = mod.longDesc || mod.desc;
            document.getElementById('detailSpecs').innerHTML = mod.specs.map(s => `<span>${s}</span>`).join('');
            document.getElementById('detailDownload').onclick = function() {
                if (mod.file !== '#') {
                    window.open(mod.file, '_blank');
                } else {
                    alert('⚠️ Ссылка на этот мод временно недоступна.');
                }
                recordDownload();
            };
            document.getElementById('modDetail').classList.add('show');
            document.getElementById('modDetail').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.getElementById('closeDetail').addEventListener('click', () => {
            document.getElementById('modDetail').classList.remove('show');
        });

        // ==== КАТЕГОРИИ ====
        document.querySelectorAll('.categories button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderMods(this.dataset.cat);
                document.getElementById('modDetail').classList.remove('show');
            });
        });

        // ==== ПРОФИЛЬ ====
        let isLogged = false;
        document.getElementById('loginBtn').addEventListener('click', function() {
            if (!isLogged) {
                const name = prompt('Введите ваш ник:');
                if (name && name.trim()) {
                    document.querySelector('.profile .name').textContent = name.trim();
                    document.querySelector('.profile .status').textContent = '✅ В сети';
                    this.textContent = 'Выйти';
                    isLogged = true;
                }
            } else {
                document.querySelector('.profile .name').textContent = 'Гость';
                document.querySelector('.profile .status').textContent = '👋 Добро пожаловать';
                this.textContent = 'Войти';
                isLogged = false;
            }
        });

        document.getElementById('profileNav').addEventListener('click', () => {
            const name = document.querySelector('.profile .name').textContent;
            alert(
                `👤 ПРОФИЛЬ\n\n` +
                `Ник: ${name}\n` +
                `Статус: ${isLogged ? 'В сети' : 'Офлайн'}\n\n` +
                `📊 СТАТИСТИКА САЙТА:\n` +
                `👀 Посещений: ${stats.visits}\n` +
                `📥 Скачиваний: ${stats.downloads}`
            );
        });

        // ==== СТАРТ ====
        renderMods('all');
    </script>
