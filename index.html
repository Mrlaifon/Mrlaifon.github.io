        body {
            background: #0b0b1a;

        .app {

        }
        .header {

            justify-content: space-between;
            align-items: center;

            margin-bottom: 18px;
            padding-bottom: 12px;

        }
        .header .title {

            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .badge {
            background: #1f1f3a;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #8a8aaa;
            border: 1px solid #2f2f5a;
        }
        .profile {
            background: #1a1a36;
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            border: 1px solid #2a2a5a;
        }
        .profile .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7c948, #f39c12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #0b0b1a;
            flex-shrink: 0;
        }
        .profile .info { flex: 1; }
        .profile .info .name { font-weight: 600; font-size: 15px; }
        .profile .info .status { font-size: 12px; color: #7a7aaa; }
        .profile .login-btn {
            background: #2a4a8a;
            border: none;
            color: #fff;
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .profile .login-btn:active { transform: scale(0.94); }

            margin-bottom: 16px;

            border: 1px solid #2a2a5a;
            background: #161632;
            color: #a0a0c0;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .categories button.active {
            background: #2a4a8a;
            border-color: #4a7ac0;
            color: #fff;
            box-shadow: 0 0 20px rgba(60,100,255,0.2);

        .categories button:active { transform: scale(0.96); }

            flex-direction: column;
            gap: 14px;

        .mod-card {
            background: #161632;
            border-radius: 20px;
            padding: 14px 16px;
            border: 1px solid #22224a;
            display: flex;

            align-items: center;

            background: #1f1f42;

            border: none;
            color: #fff;

            border-radius: 30px;
            font-weight: 600;

            font-size: 14px;

            text-align: center;

            justify-content: center;

            border-radius: 30px;
            font-size: 12px;
            color: #8a8aaa;
            border: 1px solid #2a2a5a;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111128;
            border-top: 1px solid #1f1f42;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 12px;
            backdrop-filter: blur(10px);

            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;

            // ===== ЧИТЫ (X-Ray, Fly и т.д.) =====
            { id: 35, name: "X-Ray Textures", category: "cheats", icon: "🕳️", desc: "Показывает руду сквозь камень.", longDesc: "Быстрый поиск алмазов и ресурсов.", file: "#", version: "1.16.5", specs: ["Чит", "X-Ray", "Ресурсы"] },
            { id: 36, name: "Chest Search", category: "cheats", icon: "🔍", desc: "Поиск сундуков в радиусе 30 блоков.", longDesc: "Находит все сундуки вокруг.", file: "#", version: "1.16.5", specs: ["Чит", "Поиск", "Сундуки"] },
            { id: 37, name: "No Fall Damage", category: "cheats", icon: "🪂", desc: "Отключает урон от падения.", longDesc: "Падай с любой высоты без последствий.", file: "#", version: "1.16.5", specs: ["Чит", "Безопасность", "Forge"] },
            { id: 38, name: "Fly Mod", category: "cheats", icon: "🕊️", desc: "Полёт в выживании.", longDesc: "Включает режим полёта, как в творчестве.", file: "#", version: "1.16.5", specs: ["Чит", "Полёт", "Forge"] },

            // ===== ТЕКСТУРПАКИ =====
            { id: 39, name: "Faithful 1.16.5", category: "texture", icon: "🎨", desc: "Классические текстуры в высоком разрешении.", longDesc: "Улучшенные текстуры без изменения стиля.", file: "#", version: "1.16.5", specs: ["Текстурпак", "HD", "Оптимизация"] },
            { id: 40, name: "Dramatic Skys", category: "texture", icon: "🌅", desc: "Красивые небеса и облака.", longDesc: "Реалистичное небо с облаками и закатами.", file: "#", version: "1.16.5", specs: ["Текстурпак", "Небо", "Реализм"] },
            { id: 41, name: "Better Leaves", category: "texture", icon: "🍃", desc: "Улучшенные листья деревьев.", longDesc: "Листва становится объёмной и красивой.", file: "#", version: "1.16.5", specs: ["Текстурпак", "Природа", "Forge"] }
        ];

        // ==== СТАТИСТИКА ====
        let stats = JSON.parse(localStorage.getItem('mrlaifon_stats')) || { visits: 0, downloads: 0 };

        function updateStats() {
            if (!localStorage.getItem('mrlaifon_visited')) {
                stats.visits += 1;
                localStorage.setItem('mrlaifon_visited', 'true');
                localStorage.setItem('mrlaifon_stats', JSON.stringify(stats));
            }
        }
        updateStats();

        function recordDownload() {
            stats.downloads += 1;
            localStorage.setItem('mrlaifon_stats', JSON.stringify(stats));
        }

        // ==== РЕНДЕР ====
        function renderMods(category = 'all') {
            const grid = document.getElementById('modsGrid');
            const filtered = category === 'all' ? mods : mods.filter(m => m.category === category);
            grid.innerHTML = filtered.map(m => `
                <div class="mod-card" data-id="${m.id}">
                    <div class="icon">${m.icon}</div>
                    <div class="info">
                        <div class="name">${m.name}</div>
                        <div class="desc">${m.desc}</div>
                    </div>
                    <button class="download-btn" data-file="${m.file}">⬇ Скачать</button>
                </div>
            `).join('');

            document.querySelectorAll('.mod-card .download-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const card = this.closest('.mod-card');
                    const id = parseInt(card.dataset.id);
                    const mod = mods.find(m => m.id === id);
                    if (mod) {
                        recordDownload();
                        showDetail(mod);
                    }
                });
            });

            document.querySelectorAll('.mod-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const mod = mods.find(m => m.id === id);
                    if (mod) showDetail(mod);
                });
            });
        }

        // ==== ДЕТАЛИ ====
        function showDetail(mod) {
            document.getElementById('detailIcon').textContent = mod.icon;
            document.getElementById('detailName').textContent = mod.name;
            document.getElementById('detailVersion').textContent = `📌 Версия: ${mod.version}`;
            document.getElementById('detailDesc').textContent = mod.longDesc || mod.desc;
            document.getElementById('detailSpecs').innerHTML = mod.specs.map(s => `<span>${s}</span>`).join('');
            document.getElementById('detailDownload').onclick = function() {
                window.open(mod.file, '_blank');
                recordDownload();
            };
            document.getElementById('modDetail').classList.add('show');
            document.getElementById('modDetail').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.getElementById('closeDetail').addEventListener('click', () => {
            document.getElementById('modDetail').classList.remove('show');
        });

        // ==== КАТЕГОРИИ ====
        document.querySelectorAll('.categories button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderMods(this.dataset.cat);
                document.getElementById('modDetail').classList.remove('show');
            });
        });

        // ==== ПРОФИЛЬ ====
        let isLogged = false;
        document.getElementById('loginBtn').addEventListener('click', function() {
            if (!isLogged) {
                const name = prompt('Введите ваш ник:');
                if (name && name.trim()) {
                    document.querySelector('.profile .name').textContent = name.trim();
                    document.querySelector('.profile .status').textContent = '✅ В сети';
                    this.textContent = 'Выйти';
                    isLogged = true;
                }
            } else {
                document.querySelector('.profile .name').textContent = 'Гость';
                document.querySelector('.profile .status').textContent = '👋 Добро пожаловать';
                this.textContent = 'Войти';
                isLogged = false;
            }
        });

        document.getElementById('profileNav').addEventListener('click', () => {
            const name = document.querySelector('.profile .name').textContent;
            alert(
                `👤 ПРОФИЛЬ\n\n` +
                `Ник: ${name}\n` +
                `Статус: ${isLogged ? 'В сети' : 'Офлайн'}\n\n` +
                `📊 СТАТИСТИКА САЙТА:\n` +
                `👀 Посещений: ${stats.visits}\n` +
                `📥 Скачиваний: ${stats.downloads}`
            );
        });

        // ==== СТАРТ ====
        renderMods('all');
    </script>
</body>
</html>
